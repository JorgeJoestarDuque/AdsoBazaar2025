<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
    <link rel="stylesheet" href="../diseño CSS/base.css">
    <link rel="stylesheet" href="inventario-estilos.css">
    <!--<link rel="stylesheet" href="inventario.css">-->
    <link rel="shortcut icon" href="../recursos/Icono - inventario.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>
<!-- Barra superior junto a barra de busqueda y botones-->

<div class="topbar">
    <button id="btn" class="boton">
        <span class="l1"></span>
        <span class="l2"></span>
        <span class="l3"></span>
    </button>
    <img src="../recursos/logoB.png" alt="Logo de la empresa">
    <button class="btn-logout" onclick="window.location.href='../inicioRegistro/inicioSesion.html'">Cerrar Sesión</button>
</div>
<div class="sidebar">
    <div class="user">
        <img src="../recursos/Usuario.png" alt="Usuario">
    </div>

    <ul class="menu">
        <li onclick="window.location.href='../menu/menu.html'">
            <img src="../recursos/Home.png" alt="Inicio">
        </li>
        <li onclick="window.location.href='../Analitica - HTML CSS JS/analitica.html'">
            <img src="../recursos/Finanza.png" alt="Dinero">
        </li>
        <li onclick="window.location.href='../Inventario - HTML BAzar/Inventario.html'">
            <img src="../recursos/Caja.png" alt="Caja">
        </li>
    </ul>

    <div class="settings">
        <img src="../recursos/Configuracion.png" alt="Configuración">
    </div>
</div>

<div class="contenido">

<div class="acciones">
  <input type="text" placeholder="Buscar producto..." class="busqueda">
  
  <button class="btn agregar" onclick="openModal('modal-add')">Añadir producto</button>
</div>
<!-- Contenido General -->

  <h2 class="titulo-productos">Todos de productos en Bodega</h2>
  <table class="tabla-productos">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Cantidad</th>
      <th>Marca</th>
      <th>Tipo</th>
      <th>Fecha de vencimiento</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Nombre del producto</td>
      <td>#</td>
      <td>Marca</td>
      <td>Tipo</td>
      <td class="acciones">
        <button class="btn-accion editar"></button>
        <button class="btn-accion eliminar"></button>
      </td>
    </tr>
    <tr>
      <td>Nombre del producto</td>
      <td>#</td>
      <td>Marca</td>
      <td>Tipo</td>
      <td class="acciones">
        <button class="btn-accion editar"></button>
        <button class="btn-accion eliminar"></button>
      </td>
    </tr>
    <tr>
      <td>Nombre del producto</td>
      <td>#</td>
      <td>Marca</td>
      <td>Tipo</td>
      <td class="acciones">
        <button class="btn-accion editar"></button>
        <button class="btn-accion eliminar"></button>
      </td>
    </tr>
  </tbody>
</table>
</div>

<!-- Modal para Añadir Producto -->
<div id="modal-add" class="modal">
  <div class="modal-content">
    <span class="close" data-modal="modal-add">&times;</span>
<h2 class="modal-title">Registro</h2>

<form id="form-add" class="form-registro">
  <div class="form-grid">
    <div class="form-field">
      <label for="tipo">Tipo</label>
      <input id="tipo" name="tipo" type="text">
    </div>

    <div class="form-field">
      <label for="gramaje">Gramaje</label>
      <input id="gramaje" name="gramaje" type="text">
    </div>

    <div class="form-field">
      <label for="marca">Marca</label>
      <input id="marca" name="marca" type="text">
    </div>

    <div class="form-field">
      <label for="fecha">Fecha de vencimiento</label>
      <input id="fecha" name="fecha" type="date">
      
    </div>

    <div class="form-field">
      <label for="lote">Lote</label>
      <input id="lote" name="lote" type="text">
    </div>

    <div class="form-field">
      <label for="nombre">Nombre del producto</label>
      <input id="nombre" name="nombre" type="text">
    </div>

    <!-- Cantidad a lo ancho de las dos columnas -->
    <div class="form-field full">
      <label for="cantidad">Cantidad</label>
      <input id="cantidad" name="cantidad" type="number" min="0">
    </div>
  </div>

  <div class="acciones-form">
    <button type="button" class="btn-acciones" id="btn-cancelar">Cancelar</button>
    <button type="button" class="btn-acciones" id="btn-registrar">Registrar</button>
  </div>
</form>

  </div>
</div>

<!-- Modal para Eliminar Producto -->
<div id="modal-delete" class="modal" style="display:none;">
  <div class="modal-content">
    <span class="close" data-modal="modal-delete">&times;</span>
    <h3>Confirmar eliminación</h3>
    <p id="modal-delete-text">¿Eliminar producto?</p>
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px;">
      <button id="modal-delete-cancel" class="btn-acciones" type="button">Cancelar</button>
      <button id="modal-delete-confirm" class="btn-acciones" type="button">Eliminar</button>
    </div>
  </div>
</div>

<!-- cargar lógica de inventario (no cambia estética) -->
<script src="inventario.js"></script>
</body>
</html>
